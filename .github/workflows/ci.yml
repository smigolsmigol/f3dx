name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: f3dx-${{ matrix.os }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --release -- -D warnings

      - name: Install maturin + bench deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest openai anthropic pydantic-ai langchain-openai
          pip install "tracewright @ git+https://github.com/smigolsmigol/tracewright"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install built wheel
        shell: bash
        run: pip install --force-reinstall dist/*.whl

      - name: Smoke import (built wheel, not editable)
        run: python -c "import f3dx; print(f3dx.__version__); print(sorted(x for x in dir(f3dx._f3dx) if not x.startswith('_')))"

      - name: Smoke import (compat shim)
        run: python -c "from f3dx.compat import OpenAI; import openai; print('OpenAI subclass:', issubclass(OpenAI, openai.OpenAI))"

      - name: Bench — concurrent tool dispatch
        run: python bench/bench_concurrent.py

      - name: Verify — tool-call reassembly
        run: python bench/verify_assembled.py

      - name: Verify — AgentRuntime OTel spans
        run: python bench/verify_otel.py

      - name: Verify — HTTP-level OTel spans
        run: python bench/verify_otel_http.py

      - name: Bench — OpenAI streaming vs openai SDK
        run: python bench/bench_streaming.py

      - name: Bench — Anthropic streaming vs anthropic SDK
        run: python bench/bench_anthropic_streaming.py

      - name: Verify — validate_json on assembled stream
        run: python bench/verify_validated.py

      - name: Verify — panic hook + concurrent dispatch safety
        run: python bench/verify_panic_hook.py

      - name: Verify — openai-compat subclass shim
        run: python bench/verify_compat.py

      - name: Verify — f3dx[pydantic-ai] integration end-to-end
        run: python bench/verify_pydantic_ai.py

      - name: Verify — f3dx[langchain] integration end-to-end
        run: python bench/verify_langchain.py

      - name: Verify — capture_messages opt-in trace enrichment
        run: python bench/verify_capture_messages.py

      - name: Verify — AsyncAnthropic + pydantic-ai anthropic_model
        run: python bench/verify_anthropic_compat.py

      - name: Verify — token counts in JSONL trace rows
        run: python bench/verify_token_counts.py

      - name: Verify — MCP stdio client (npx server-everything)
        run: python bench/verify_mcp.py
