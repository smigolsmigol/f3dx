name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --release -- -D warnings
        continue-on-error: true  # Phase 1 of CI: report only, don't gate

      - name: Install maturin + bench deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest openai anthropic

      - name: Build wheel + install editable
        run: maturin develop --release

      - name: Smoke import
        run: python -c "import f3dx; print(f3dx.__version__); print(sorted(x for x in dir(f3dx._f3dx) if not x.startswith('_')))"

      - name: Bench — concurrent tool dispatch
        run: python bench/bench_concurrent.py

      - name: Verify — tool-call reassembly
        run: python bench/verify_assembled.py

      - name: Verify — AgentRuntime OTel spans
        run: python bench/verify_otel.py

      - name: Verify — HTTP-level OTel spans
        run: python bench/verify_otel_http.py

      - name: Bench — OpenAI streaming vs openai SDK
        run: python bench/bench_streaming.py

      - name: Bench — Anthropic streaming vs anthropic SDK
        run: python bench/bench_anthropic_streaming.py

      - name: Verify — validate_json on assembled stream
        run: python bench/verify_validated.py
