[package]
name = "agx"
version = "0.0.2"
edition = "2024"
authors = ["Federico Coccoli <fed1@f3d1.dev>"]
description = "Rust-core runtime for pydantic-ai. Polars for agents."
license = "MIT"
repository = "https://github.com/smigolsmigol/agx"

[lib]
name = "_agx"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module", "abi3-py310"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ahash = "0.8"

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
strip = "symbols"

[profile.bench]
inherits = "release"
