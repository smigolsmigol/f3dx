[build-system]
requires = ["maturin>=1.13,<2.0"]
build-backend = "maturin"

[project]
name = "f3dx"
version = "0.0.3"
description = "F3D1 Rust-core runtime for pydantic-ai. Polars for agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Federico Coccoli", email = "fed1@f3d1.dev" },
]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: OSI Approved :: MIT License",
]
dependencies = []

[project.optional-dependencies]
openai-compat = [
    "openai>=1.50",
]
dev = [
    "pytest>=8.0",
    "maturin>=1.13",
    "openai>=1.50",
]

[tool.maturin]
manifest-path = "crates/f3dx-py/Cargo.toml"
features = ["pyo3/extension-module"]
module-name = "f3dx._f3dx"
python-source = "python"
